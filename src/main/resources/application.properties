spring.application.name=tienda
#Puerto por donde escucha el servidor web
server.port=80

#para definir el formato de salida del log en cuanto a horas y minutos
logging.pattern.dateformat=HH:mm

#Evitamos salida del banner de spring
spring.main.banner-mode=off

#Definimos el cache como false en desarrollo, en produccion sera true.
spring.thymeleaf.cache=false

#Conexion local a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/techshop

#Usuario y clave
spring.datasource.username=usuario_prueba
spring.datasource.password=Usuar1o_Clave.


#Drivers y Plataforma de comunicacion
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#Mostrar informacion en log de DB
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=debug
logging.level.org.type.descriptor.sql.BasicBinder=trace
